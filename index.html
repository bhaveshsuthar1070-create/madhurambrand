<!DOCTYPE html>
<html>
<head>
<title>Madhuram Brand</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#6a5cff;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>Madhuram Brand</h1>
<p>Find profitable products</p>

<input type="number" id="budget" placeholder="Enter your budget">

<br>

<button onclick="findProduct()">Find Product</button>

<div class="result" id="result"></div>

</div>

<script>

function findProduct(){

let budget = document.getElementById("budget").value;

let result = "";

if(budget >= 500 && budget < 1000){
result = "Product Idea: Phone Cover<br>Buy: ₹30<br>Sell: ₹99<br>Profit: ₹69";
}

else if(budget >= 1000 && budget < 3000){
result = "Product Idea: LED Light<br>Buy: ₹120<br>Sell: ₹399<br>Profit: ₹279";
}

else if(budget >= 3000){
result = "Product Idea: Smart Watch<br>Buy: ₹600<br>Sell: ₹1499<br>Profit: ₹899";
}

else{
result = "Enter at least ₹500 budget";
}

document.getElementById("result").innerHTML = result;

}

</script>

</body>
</html>

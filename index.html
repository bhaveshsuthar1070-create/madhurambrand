<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madhuram - Start Your Own Cleaning Brand</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="max-w-6xl mx-auto p-6">

<div class="text-center mb-10">
<h1 class="text-4xl font-bold mb-4">Start Your Own Cleaning Brand With Just ₹10,000</h1>
<p>No factory. No manufacturing. Launch your own cleaning products brand.</p>

<div class="bg-yellow-100 border p-4 rounded mt-6">
<b>Only <span id="kitStock">20</span> Starter Kits Available</b>
</div>
</div>

<div class="bg-white p-6 rounded-xl shadow mb-6">

<h2 class="font-bold mb-4">1️⃣ Select Products</h2>

<div class="grid md:grid-cols-2 gap-3">

<label><input type="checkbox" value="Toilet Cleaner 500ml" class="product"> Toilet Cleaner 500ml</label>
<label><input type="checkbox" value="Phenyl 1L" class="product"> Phenyl 1L</label>
<label><input type="checkbox" value="Hand Wash 500ml" class="product"> Hand Wash 500ml</label>
<label><input type="checkbox" value="Dish Wash 500g" class="product"> Dish Wash Tub 500g</label>
<label><input type="checkbox" value="Machine Wash Liquid 1L" class="product"> Machine Wash Liquid 1L</label>
<label><input type="checkbox" value="Detergent Cake 200g" class="product"> Detergent Cake 200g</label>
<label><input type="checkbox" value="Bucket Wash Powder 1kg" class="product"> Bucket Wash Powder 1kg</label>
<label><input type="checkbox" value="Machine Wash Powder 1kg" class="product"> Machine Wash Powder 1kg</label>

</div>

</div>

<div class="bg-white p-6 rounded-xl shadow mb-6">

<h2 class="font-bold mb-4">2️⃣ Select Your Brand Kit</h2>

<select id="budget" class="w-full border p-3 rounded">

<option value="10000">Starter Kit – ₹10,000</option>
<option value="20000">Small Business Kit – ₹20,000</option>
<option value="50000">Business Kit – ₹50,000</option>

</select>

<button onclick="calculate()" class="mt-4 w-full bg-black text-white p-3 rounded">
Calculate My Kit
</button>

</div>

<div id="result" class="bg-white p-6 rounded-xl shadow hidden mb-6">

<h2 class="text-xl font-bold mb-4">Your Kit Details</h2>

<div id="items"></div>

<div class="mt-4 bg-gray-100 p-4 rounded">

<p id="kitName"></p>
<p id="totalCost"></p>
<p id="marketValue"></p>
<p id="profit" class="font-bold"></p>

</div>

</div>

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="font-bold mb-4">Start Your Brand</h2>

<input id="name" class="w-full border p-3 rounded mb-3" placeholder="Your Name">
<input id="phone" class="w-full border p-3 rounded mb-3" placeholder="Phone Number">
<input id="city" class="w-full border p-3 rounded mb-3" placeholder="City">

<button onclick="sendLead()" class="w-full bg-green-600 text-white p-3 rounded">
Submit
</button>

</div>

</div>

<a href="https://wa.me/918769001655" class="fixed bottom-6 right-6 bg-green-500 text-white px-5 py-3 rounded-full">
Chat on WhatsApp
</a>

<script>

let kitStock=20

const products={
"Toilet Cleaner 500ml":{price:35,market:90},
"Phenyl 1L":{price:20,market:70},
"Hand Wash 500ml":{price:50,market:120},
"Dish Wash 500g":{price:28,market:70},
"Machine Wash Liquid 1L":{price:85,market:190},
"Detergent Cake 200g":{price:8,market:20},
"Bucket Wash Powder 1kg":{price:55,market:130},
"Machine Wash Powder 1kg":{price:70,market:160}
}

function calculate(){

const selected=document.querySelectorAll('.product:checked')
const budget=parseInt(document.getElementById('budget').value)

if(selected.length===0){
alert("Please select products")
return
}

const splitBudget=budget/selected.length

let html=""
let totalMarket=0

selected.forEach(item=>{

const p=products[item.value]
const pieces=Math.floor(splitBudget/p.price)
const value=pieces*p.market

totalMarket+=value

html+=`<div class="border-b py-2">
<b>${item.value}</b><br>
Cost Price Per Piece: ₹${p.price}<br>
Market Price Per Piece: ₹${p.market}<br>
Pieces You Get: ${pieces}
</div>`

})

const profit=totalMarket-budget

document.getElementById('items').innerHTML=html
document.getElementById('totalCost').innerText="Investment: ₹"+budget
document.getElementById('marketValue').innerText="Market Value: ₹"+totalMarket
document.getElementById('profit').innerText="Profit Potential: ₹"+profit
document.getElementById('kitName').innerText="Selected Kit Budget: ₹"+budget

document.getElementById('result').classList.remove('hidden')

}

function sendLead(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value
const city=document.getElementById("city").value
const budget=document.getElementById("budget").value

if(name=="" || phone==""){
alert("Fill name and phone")
return
}

let productList=""

document.querySelectorAll('.product:checked').forEach(p=>{
productList+=p.value+", "
})

const message=`New Brand Kit Lead:%0A
Name: ${name}%0A
Phone: ${phone}%0A
City: ${city}%0A
Selected Kit Budget: ₹${budget}%0A
Products: ${productList}`

window.open("https://wa.me/918769001655?text="+message)

if(kitStock>0){
kitStock--
document.getElementById("kitStock").innerText=kitStock
}

}

</script>

</body>
</html>

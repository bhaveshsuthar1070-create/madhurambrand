<!DOCTYPE html>
<html>
<head>
<title>Madhuram Brand Kit Calculator</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#25D366;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#fafafa;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Madhuram Brand Kit Finder</h2>

<input id="name" placeholder="Your Name">

<input id="phone" placeholder="Phone Number">

<input id="city" placeholder="City">

<select id="budget">
<option value="10000">₹10,000 Kit</option>
<option value="20000">₹20,000 Kit</option>
<option value="30000">₹30,000 Kit</option>
<option value="50000">₹50,000 Kit</option>
</select>

<button onclick="calculateKit()">Calculate Kit</button>

<div id="result" class="result"></div>

<button onclick="sendWhatsApp()">Submit on WhatsApp</button>

</div>


<script>

let products=[

{name:"Phenyl",price:80},
{name:"Hand Wash",price:70},
{name:"Dish Wash",price:65},
{name:"Toilet Cleaner",price:90},
{name:"Floor Cleaner",price:85},
{name:"Glass Cleaner",price:95},
{name:"Liquid Detergent",price:120},
{name:"Fabric Conditioner",price:130},
{name:"Car Shampoo",price:110},
{name:"Room Freshener",price:140},
{name:"Drain Cleaner",price:150},
{name:"Bathroom Cleaner",price:100},
{name:"Kitchen Cleaner",price:105},
{name:"Multi Surface Cleaner",price:115},
{name:"Sofa Cleaner",price:135},
{name:"Tile Cleaner",price:125},
{name:"Dishwash Gel",price:75},
{name:"Stain Remover",price:160},
{name:"Hand Sanitizer",price:60},
{name:"Floor Disinfectant",price:95}

];

function calculateKit(){

let budget=document.getElementById("budget").value;

let resultHTML="";

products.forEach(p=>{

let pieces=Math.floor(budget/products.length/p.price);

let total=pieces*p.price;

resultHTML+=`
<b>${p.name}</b><br>
Price: ₹${p.price}<br>
Pieces: ${pieces}<br>
Total: ₹${total}<br><br>
`;

});

document.getElementById("result").innerHTML=resultHTML;

}


function sendWhatsApp(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let city=document.getElementById("city").value;
let budget=document.getElementById("budget").value;

let message="New Kit Lead%0A%0A";

message+="Name: "+name+"%0A";
message+="Phone: "+phone+"%0A";
message+="City: "+city+"%0A";
message+="Budget: ₹"+budget;

let url="https://wa.me/918769001655?text="+message;

window.open(url,"_blank");

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madhuram - Start Your Own Cleaning Brand</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="max-w-6xl mx-auto p-6">

<div class="text-center mb-10">
<h1 class="text-4xl font-bold mb-4">Start Your Own Cleaning Brand With Just ₹10,000</h1>
<p class="text-lg">No factory. No manufacturing. Launch your own cleaning products brand with ready-to-sell items.</p>
</div>

<div class="bg-white p-6 rounded-2xl shadow mb-6">

<h2 class="font-bold mb-4 text-xl">1️⃣ Select Products</h2>

<div class="grid md:grid-cols-2 gap-3">

<label><input type="checkbox" value="toilet" class="product"> Toilet Cleaner 500ml</label>
<label><input type="checkbox" value="phenyl" class="product"> Phenyl 1L</label>
<label><input type="checkbox" value="handwash" class="product"> Hand Wash 500ml</label>
<label><input type="checkbox" value="dishtub" class="product"> Dish Wash Tub 500g</label>
<label><input type="checkbox" value="machliquid" class="product"> Machine Wash Liquid 1L</label>
<label><input type="checkbox" value="cake" class="product"> Detergent Cake 200g</label>
<label><input type="checkbox" value="bucketpowder" class="product"> Bucket Wash Powder 1kg</label>
<label><input type="checkbox" value="machinepowder" class="product"> Machine Wash Powder 1kg</label>

</div>
</div>

<div class="bg-white p-6 rounded-2xl shadow mb-6">

<h2 class="font-bold mb-4 text-xl">2️⃣ Select Your Budget</h2>

<select id="budget" class="w-full border p-3 rounded">
<option value="10000">₹10,000 – Starter Brand Kit</option>
<option value="20000">₹20,000 – Small Business Kit</option>
<option value="50000">₹50,000 – Business Kit</option>
</select>

<button onclick="calculate()" class="mt-4 w-full bg-black text-white p-3 rounded-xl">
Calculate My Brand Package
</button>

</div>

<div id="result" class="bg-white p-6 rounded-2xl shadow hidden mb-6">

<h2 class="text-xl font-bold mb-4">Your Brand Package</h2>

<div id="items"></div>

<div class="mt-6 p-4 bg-gray-100 rounded-xl">
<p id="totalCost"></p>
<p id="marketValue"></p>
<p id="profit" class="font-bold"></p>
</div>

</div>

<div class="bg-white p-6 rounded-2xl shadow mb-10">

<h2 class="text-xl font-bold mb-4">Start Your Brand</h2>

<input id="name" class="w-full border p-3 rounded mb-3" placeholder="Your Name">
<input id="phone" class="w-full border p-3 rounded mb-3" placeholder="Phone Number">
<input id="city" class="w-full border p-3 rounded mb-3" placeholder="City">

<button onclick="sendLead()" class="w-full bg-green-600 text-white p-3 rounded-xl">
Submit
</button>

</div>

</div>

<a href="https://wa.me/918769001655"
class="fixed bottom-6 right-6 bg-green-500 text-white px-5 py-3 rounded-full shadow-lg">
Chat on WhatsApp
</a>

<script>

const products={
toilet:{name:"Toilet Cleaner 500ml",price:40,market:90},
phenyl:{name:"Phenyl 1L",price:26,market:70},
handwash:{name:"Hand Wash 500ml",price:58,market:120},
dishtub:{name:"Dish Wash Tub 500g",price:28,market:70},
machliquid:{name:"Machine Wash Liquid 1L",price:105,market:190},
cake:{name:"Detergent Cake 200g",price:8,market:20},
bucketpowder:{name:"Bucket Wash Powder 1kg",price:58,market:130},
machinepowder:{name:"Machine Wash Powder 1kg",price:73,market:160}
}

function calculate(){

const selected=document.querySelectorAll('.product:checked')
const budget=parseInt(document.getElementById('budget').value)

if(selected.length===0){
alert("Please select at least one product")
return
}

const splitBudget=budget/selected.length

let html=""
let totalMarket=0

selected.forEach(item=>{

const p=products[item.value]
const pieces=Math.floor(splitBudget/p.price)
const value=pieces*p.market

totalMarket+=value

html+=`<div class="border-b py-3">
<b>${p.name}</b><br>
Price Per Piece: ₹${p.price}<br>
Pieces You Will Get: ${pieces}
</div>`

})

const profit=totalMarket-budget

document.getElementById('items').innerHTML=html
document.getElementById('totalCost').innerText="Your Investment: ₹"+budget
document.getElementById('marketValue').innerText="Estimated Market Value: ₹"+totalMarket
document.getElementById('profit').innerText="Estimated Profit Potential: ₹"+profit

document.getElementById('result').classList.remove('hidden')

}

function sendLead(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value
const city=document.getElementById("city").value

if(name=="" || phone==""){
alert("Please fill your name and phone")
return
}

const message=`New Brand Starter Lead:%0AName: ${name}%0APhone: ${phone}%0ACity: ${city}`

window.open("https://wa.me/918769001655?text="+message)

}

</script>

</body>
</html>
